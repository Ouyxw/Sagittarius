name: Phase 13 CUDA Wheel Smoke

on:
  workflow_dispatch:
    inputs:
      candidate-run-id:
        description: "Run ID from Phase 13 Canonical Candidate Artifact"
        required: true
      candidate-artifact-name:
        description: "Canonical candidate artifact name"
        required: true
      expected-version:
        description: "Expected candidate version"
        required: true
        default: "1.0.9"
      expected-commit:
        description: "Expected full candidate commit SHA"
        required: true
      candidate-tag:
        description: "Expected immutable candidate tag"
        required: true

permissions:
  actions: read
  contents: read

jobs:
  cuda-wheel-smoke:
    name: CUDA wheel smoke and CPU/CUDA parity
    runs-on: [self-hosted, linux, x64, cuda]
    timeout-minutes: 90
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ""
      SAGITTARIUS_RUN_CUDA_WHEEL_SMOKE: "1"
      SAGITTARIUS_ENABLE_GPU_TESTS: "1"
      SAGITTARIUS_RELEASE_DIST_DIR: ${{ github.workspace }}/phase13-candidate-dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected-commit }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sagittarius_py/uv.lock"

      - name: Create CUDA evidence directory
        shell: bash
        run: |
          evidence_dir="$RUNNER_TEMP/phase13-cuda-wheel-evidence"
          mkdir -p "$evidence_dir"
          echo "EVIDENCE_DIR=$evidence_dir" >> "$GITHUB_ENV"

      - name: Download canonical candidate
        uses: ./.github/actions/phase13-download-candidate
        with:
          run-id: ${{ inputs.candidate-run-id }}
          artifact-name: ${{ inputs.candidate-artifact-name }}
          expected-version: ${{ inputs.expected-version }}
          expected-commit: ${{ inputs.expected-commit }}
          expected-tag: ${{ inputs.candidate-tag }}
          github-token: ${{ github.token }}
          destination: phase13-candidate-dist

      - name: Show CUDA host visibility
        run: |
          evidence_dir="$RUNNER_TEMP/phase13-cuda-wheel-evidence"
          mkdir -p "$evidence_dir"
          echo "EVIDENCE_DIR=$evidence_dir" >> "$GITHUB_ENV"
          nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader \
            | tee "$evidence_dir/nvidia-smi.csv"

      - name: Run CUDA wheel smoke and parity
        working-directory: sagittarius_py
        run: |
          set -o pipefail
          uv run python -m pytest \
            tests/test_packaging_artifacts.py::test_clean_venv_installed_wheel_cuda_smoke_and_parity \
            -q 2>&1 | tee "$EVIDENCE_DIR/cuda-wheel-smoke.log"

      - name: Record CUDA wheel evidence
        if: always()
        env:
          VALIDATION_COMMAND: >-
            uv run python -m pytest
            tests/test_packaging_artifacts.py::test_clean_venv_installed_wheel_cuda_smoke_and_parity
            -q
          JOB_STATUS: ${{ job.status }}
          CANDIDATE_COMMIT: ${{ inputs.expected-commit }}
          CANDIDATE_REF: refs/tags/${{ inputs.candidate-tag }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          evidence_dir.mkdir(parents=True, exist_ok=True)
          manifest = Path("phase13-candidate-dist/candidate-manifest.json")
          if manifest.exists():
              Path(os.environ["EVIDENCE_DIR"], "candidate-manifest.json").write_bytes(manifest.read_bytes())
          evidence = {
              "schema_version": "phase13-cuda-wheel-evidence/v1",
              "status": os.environ["JOB_STATUS"],
              "candidate_run_id": "${{ inputs.candidate-run-id }}",
              "commit": os.environ["CANDIDATE_COMMIT"],
              "ref": os.environ["CANDIDATE_REF"],
              "run_url": "{}/{}/actions/runs/{}".format(os.environ["GITHUB_SERVER_URL"], os.environ["GITHUB_REPOSITORY"], os.environ["GITHUB_RUN_ID"]),
              "runner_os": os.environ["RUNNER_OS"],
              "validation_command": os.environ["VALIDATION_COMMAND"],
              "required_environment": {
                  "SAGITTARIUS_RUN_CUDA_WHEEL_SMOKE": "1",
                  "SAGITTARIUS_ENABLE_GPU_TESTS": "1",
              },
          }
          Path(os.environ["EVIDENCE_DIR"], "cuda-wheel-evidence.json").write_text(json.dumps(evidence, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Upload CUDA wheel evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase13-cuda-wheel-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
