name: Phase 13 Candidate Release Regression

on:
  workflow_dispatch:
    inputs:
      candidate-run-id:
        description: "Run ID from Phase 13 Canonical Candidate Artifact"
        required: true
      candidate-artifact-name:
        description: "Canonical candidate artifact name"
        required: true
      expected-version:
        description: "Expected candidate version"
        required: true
        default: "1.0.5"
      expected-commit:
        description: "Expected full candidate commit SHA"
        required: true
      candidate-tag:
        description: "Expected immutable candidate tag"
        required: true

permissions:
  actions: read
  contents: read

env:
  PYTHONNOUSERSITE: "1"
  PYTHONPATH: ""

jobs:
  python-backend-free:
    name: Python regression (backend-free)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected-commit }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sagittarius_py/uv.lock"
      - name: Download and validate canonical candidate
        uses: ./.github/actions/phase13-download-candidate
        with:
          run-id: ${{ inputs.candidate-run-id }}
          artifact-name: ${{ inputs.candidate-artifact-name }}
          expected-version: ${{ inputs.expected-version }}
          expected-commit: ${{ inputs.expected-commit }}
          expected-tag: ${{ inputs.candidate-tag }}
          github-token: ${{ github.token }}
          destination: phase13-candidate-dist
      - name: Run backend-free Python regression
        working-directory: sagittarius_py
        run: |
          uv run python -m pytest tests -q \
            --ignore=tests/test_api_v2.py \
            --ignore=tests/test_benchmarks.py \
            --ignore=tests/test_cluster.py \
            --ignore=tests/test_cross_language_golden.py \
            --ignore=tests/test_gpu_acceleration.py \
            --ignore=tests/test_invariants.py \
            --ignore=tests/test_julia_native_api.py \
            --ignore=tests/test_local_pulses.py \
            --ignore=tests/test_mc_trajectories.py \
            --ignore=tests/test_physics.py \
            --ignore=tests/test_pulse.py
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase13-regression-python-backend-free-${{ github.run_id }}
          path: phase13-candidate-dist/candidate-manifest.json
          if-no-files-found: warn

  python-julia-backed:
    name: Python regression (Julia-backed)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected-commit }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sagittarius_py/uv.lock"
      - name: Download and validate canonical candidate
        uses: ./.github/actions/phase13-download-candidate
        with:
          run-id: ${{ inputs.candidate-run-id }}
          artifact-name: ${{ inputs.candidate-artifact-name }}
          expected-version: ${{ inputs.expected-version }}
          expected-commit: ${{ inputs.expected-commit }}
          expected-tag: ${{ inputs.candidate-tag }}
          github-token: ${{ github.token }}
          destination: phase13-candidate-dist
      - name: Run Julia-backed Python regression
        working-directory: sagittarius_py
        run: |
          uv run python -m pytest tests -q \
            tests/test_api_v2.py tests/test_benchmarks.py tests/test_cluster.py \
            tests/test_cross_language_golden.py tests/test_invariants.py \
            tests/test_julia_native_api.py tests/test_local_pulses.py \
            tests/test_mc_trajectories.py tests/test_physics.py tests/test_pulse.py
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase13-regression-python-julia-${{ github.run_id }}
          path: phase13-candidate-dist/candidate-manifest.json
          if-no-files-found: warn

  julia-native:
    name: Julia native Pkg.test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected-commit }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sagittarius_py/uv.lock"
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - name: Download and validate canonical candidate
        uses: ./.github/actions/phase13-download-candidate
        with:
          run-id: ${{ inputs.candidate-run-id }}
          artifact-name: ${{ inputs.candidate-artifact-name }}
          expected-version: ${{ inputs.expected-version }}
          expected-commit: ${{ inputs.expected-commit }}
          expected-tag: ${{ inputs.candidate-tag }}
          github-token: ${{ github.token }}
          destination: phase13-candidate-dist
      - name: Validate candidate identity and run native tests
        env:
          EXPECTED_VERSION: ${{ inputs.expected-version }}
          EXPECTED_COMMIT: ${{ inputs.expected-commit }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
        working-directory: Sagittarius.jl
        run: |
          test "$(julia -e 'using TOML; print(TOML.parsefile("Project.toml")["version"])')" = "$EXPECTED_VERSION"
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          git merge-base --is-ancestor "$EXPECTED_COMMIT" origin/main
          git show-ref --verify --quiet "refs/tags/$CANDIDATE_TAG"
          julia --project=. -e 'using Pkg; Pkg.test()'
      - name: Upload native regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase13-regression-julia-native-${{ github.run_id }}
          path: phase13-candidate-dist/candidate-manifest.json
          if-no-files-found: warn
