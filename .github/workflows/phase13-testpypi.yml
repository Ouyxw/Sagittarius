name: Phase 13 TestPyPI Candidate

on:
  workflow_dispatch:
    inputs:
      expected-version:
        description: "Expected sagittarius-py version to verify after TestPyPI install"
        required: true
        default: "1.0.1"

jobs:
  testpypi-candidate:
    name: Build, check, publish to TestPyPI, and install
    runs-on: ubuntu-latest
    environment: testpypi
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sagittarius_py/uv.lock"

      - name: Create release evidence directory
        run: |
          evidence_dir="$RUNNER_TEMP/phase13-testpypi-evidence"
          mkdir -p "$evidence_dir"
          echo "EVIDENCE_DIR=$evidence_dir" >> "$GITHUB_ENV"

      - name: Build artifacts
        working-directory: sagittarius_py
        run: uv build --wheel --sdist --out-dir dist

      - name: Verify built package version and record distribution digests
        working-directory: sagittarius_py
        env:
          EXPECTED_VERSION: ${{ inputs.expected-version }}
        run: |
          uv run python - <<'PY'
          import hashlib
          import json
          import os
          import tarfile
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          wheel = next(dist.glob("*.whl"))
          sdist = next(dist.glob("*.tar.gz"))
          with zipfile.ZipFile(wheel) as archive:
              metadata = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              wheel_version = next(line.removeprefix("Version: ") for line in archive.read(metadata).decode().splitlines() if line.startswith("Version: "))
          with tarfile.open(sdist) as archive:
              pkg_info = next(member for member in archive.getmembers() if member.name.endswith("/PKG-INFO"))
              sdist_version = next(line.removeprefix("Version: ") for line in archive.extractfile(pkg_info).read().decode().splitlines() if line.startswith("Version: "))
          expected = os.environ["EXPECTED_VERSION"]
          assert wheel_version == expected, (wheel_version, expected)
          assert sdist_version == expected, (sdist_version, expected)
          evidence = {
              "schema_version": "phase13-testpypi-evidence/v1",
              "expected_version": expected,
              "built_versions": {"wheel": wheel_version, "sdist": sdist_version},
              "distributions": {path.name: {"sha256": hashlib.sha256(path.read_bytes()).hexdigest()} for path in (wheel, sdist)},
          }
          Path(os.environ["EVIDENCE_DIR"], "build-artifacts.json").write_text(json.dumps(evidence, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Check package metadata
        working-directory: sagittarius_py
        run: uv run python -m twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: sagittarius_py/dist

      - name: Verify TestPyPI install
        run: |
          python -m venv /tmp/sagittarius-testpypi-venv
          /tmp/sagittarius-testpypi-venv/bin/python -m pip install --upgrade pip
          /tmp/sagittarius-testpypi-venv/bin/python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            sagittarius-py==${{ inputs.expected-version }}
          cd /tmp
          /tmp/sagittarius-testpypi-venv/bin/sagittarius backend resolve
          /tmp/sagittarius-testpypi-venv/bin/python - <<'PY'
          import json
          import os
          import sagittarius
          report = sagittarius.doctor()
          assert report["backend_source"] == "package_resource", report["julia_backend"]
          assert sagittarius.version_info()["package_version"] == "${{ inputs.expected-version }}"

          import numpy as np
          from pathlib import Path

          register = sagittarius.Register([sagittarius.Atom(0.0, 0.0, 0.0)], C6=0.0)
          simulation = sagittarius.Simulation(
              register,
              sagittarius.PulseSequence(omega=0.0, delta=0.0),
              sagittarius.SolverConfig(saveat=[0.0, 0.1]),
          )
          result = simulation.run(
              np.array([1.0, 0.0], dtype=complex),
              0.0,
              0.1,
              observables={"pop_atom_0": 0},
          )
          artifact_path = Path(os.environ["EVIDENCE_DIR"], "testpypi-cpu-result.json")
          result.save(artifact_path)
          artifact = json.loads(artifact_path.read_text(encoding="utf-8"))
          assert artifact["schema_version"] == sagittarius.RESULT_ARTIFACT_SCHEMA_VERSION
          assert artifact["manifest"]["schema_version"] == sagittarius.RUN_MANIFEST_SCHEMA_VERSION
          assert artifact["shared_result"]["schema_version"] == sagittarius.SHARED_RESULT_SCHEMA_VERSION
          assert artifact["manifest"]["versions"]["julia"]["source"] == "package_resource"
          assert "pop_atom_0" in artifact["shared_result"]["series"]
          assert len(result.to_pandas()) >= 2

          diagnostic = {
              "backend_source": report["backend_source"],
              "doctor": report,
              "package_version": sagittarius.version_info()["package_version"],
              "cpu_smoke": {
                  "artifact": artifact_path.name,
                  "result_schema": artifact["schema_version"],
                  "manifest_schema": artifact["manifest"]["schema_version"],
                  "shared_result_schema": artifact["shared_result"]["schema_version"],
                  "rows": len(result.to_pandas()),
              },
          }
          with open(os.path.join(os.environ["EVIDENCE_DIR"], "clean-install-diagnostic.json"), "w", encoding="utf-8") as stream:
              json.dump(diagnostic, stream, indent=2, sort_keys=True)
              stream.write("\n")
          print(json.dumps(diagnostic, sort_keys=True))
          PY


      - name: Record TestPyPI file hashes and release identity
        if: success()
        env:
          EXPECTED_VERSION: ${{ inputs.expected-version }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path
          from urllib.request import urlopen

          url = "https://test.pypi.org/pypi/sagittarius-py/{}/json".format(os.environ["EXPECTED_VERSION"])
          for attempt in range(6):
              try:
                  with urlopen(url, timeout=30) as response:
                      payload = json.load(response)
                  break
              except Exception:
                  if attempt == 5:
                      raise
                  time.sleep(10)
          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          (evidence_dir / "testpypi-project.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          release = {
              "schema_version": "phase13-testpypi-evidence/v1",
              "commit": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "run_url": "{}/{}/actions/runs/{}".format(os.environ["GITHUB_SERVER_URL"], os.environ["GITHUB_REPOSITORY"], os.environ["GITHUB_RUN_ID"]),
              "expected_version": os.environ["EXPECTED_VERSION"],
              "testpypi_json_url": url,
              "testpypi_sha256": {item["filename"]: item["digests"]["sha256"] for item in payload["urls"]},
          }
          (evidence_dir / "release-evidence.json").write_text(json.dumps(release, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Upload TestPyPI release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase13-testpypi-${{ inputs.expected-version }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
