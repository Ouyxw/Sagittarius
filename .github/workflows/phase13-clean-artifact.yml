name: Phase 13 Clean Artifact Smoke

on:
  pull_request:
    paths:
      - "Sagittarius.jl/**"
      - "sagittarius_py/**"
      - "docs/getting-started/**"
      - "REQUIREMENTS.md"
      - ".github/workflows/phase13-clean-artifact.yml"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  clean-wheel-smoke:
    name: Clean wheel install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: ""
      SAGITTARIUS_RUN_RELEASE_ARTIFACT_SMOKE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sagittarius_py/uv.lock"

      - name: Run clean artifact smoke
        working-directory: sagittarius_py
        run: >-
          uv run python -m pytest
          tests/test_packaging_artifacts.py::test_clean_venv_installed_wheel_release_smoke
          tests/test_packaging_artifacts.py::test_clean_venv_installed_wheel_uninstall_reinstall_smoke
          -q
