[project]
name = "sagittarius-py"
version = "0.1.0"
description = "A high-performance Neutral Atom quantum emulator"
requires-python = ">=3.9"
dependencies = [
    "juliacall",
    "numpy",
    "pandas",
    "matplotlib",
    "networkx",
]

[dependency-groups]
dev = [
    "pytest",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["sagittarius"]
